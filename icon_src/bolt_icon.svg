<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">

  <!-- Background circle -->
  <circle cx="128" cy="128" r="124" fill="#0B1F3A"/>
  <circle cx="128" cy="128" r="124" fill="none" stroke="#1B4F8A" stroke-width="3"/>

  <!-- Car body — 2027 Bolt EV hatchback profile -->
  <!-- Main body lower slab -->
  <path d="M 38 158
             L 38 148
             Q 42 138 55 135
             L 75 130
             Q 90 100 105 88
             Q 120 76 145 74
             Q 168 72 185 80
             Q 200 87 210 100
             L 220 115
             L 225 130
             Q 228 138 222 148
             L 218 158
             Z"
        fill="#1A5FA8" />

  <!-- Roof / greenhouse -->
  <path d="M 98 135
             L 105 88
             Q 120 76 145 74
             Q 168 72 185 80
             Q 200 87 210 100
             L 220 115
             L 218 135
             Z"
        fill="#1E6DC0" />

  <!-- Window band -->
  <path d="M 104 132
             L 109 93
             Q 122 82 145 80
             Q 166 78 182 86
             Q 196 93 205 105
             L 214 120
             L 214 132
             Z"
        fill="#0D2E52" opacity="0.85"/>

  <!-- Window highlight -->
  <path d="M 112 128
             L 116 95
             Q 126 86 147 84
             Q 164 82 178 89
             L 186 96
             L 140 96
             Q 126 96 118 108
             Z"
        fill="#1A4A7A" opacity="0.5"/>

  <!-- A-pillar highlight -->
  <line x1="109" y1="93" x2="104" y2="132" stroke="#2A80D0" stroke-width="1.5" opacity="0.6"/>

  <!-- Chevy bowtie badge (simplified, on C-pillar area) -->
  <g transform="translate(195,105)">
    <path d="M -8 -3 L -2 -3 L 0 0 L -2 3 L -8 3 L -6 0 Z" fill="#C0C8D0"/>
    <path d="M 2 -3 L 8 -3 L 6 0 L 8 3 L 2 3 L 4 0 Z" fill="#C0C8D0"/>
    <rect x="-2" y="-1" width="4" height="2" fill="#C0C8D0"/>
  </g>

  <!-- Body cladding / lower rocker -->
  <rect x="60" y="154" width="158" height="7" rx="2" fill="#102A48"/>

  <!-- Side body line / character line -->
  <path d="M 55 135 Q 120 128 220 132" stroke="#2A80D0" stroke-width="1.5" fill="none" opacity="0.7"/>

  <!-- Front fascia -->
  <path d="M 38 148 Q 38 158 42 162 L 55 163 L 55 135 Q 42 138 38 148 Z"
        fill="#134A80"/>
  <!-- Front light bar -->
  <rect x="39" y="140" width="14" height="3" rx="1.5" fill="#6BBFFF" opacity="0.9"/>

  <!-- Rear -->
  <path d="M 218 158 L 222 155 Q 226 148 222 142 L 218 135 L 218 158 Z"
        fill="#134A80"/>
  <!-- Rear light bar -->
  <rect x="219" y="140" width="4" height="14" rx="1.5" fill="#E94560" opacity="0.9"/>

  <!-- Front wheel arch -->
  <ellipse cx="82" cy="163" rx="26" ry="6" fill="#0B1F3A"/>
  <!-- Rear wheel arch -->
  <ellipse cx="192" cy="163" rx="26" ry="6" fill="#0B1F3A"/>

  <!-- Front wheel -->
  <circle cx="82" cy="168" r="20" fill="#111820"/>
  <circle cx="82" cy="168" r="14" fill="#1A2535"/>
  <circle cx="82" cy="168" r="8"  fill="#0D1520"/>
  <!-- wheel spokes -->
  <g stroke="#3A5A80" stroke-width="2" opacity="0.8">
    <line x1="82" y1="154" x2="82" y2="182"/>
    <line x1="68" y1="168" x2="96" y2="168"/>
    <line x1="72" y1="158" x2="92" y2="178"/>
    <line x1="92" y1="158" x2="72" y2="178"/>
  </g>
  <circle cx="82" cy="168" r="3" fill="#4A7AA0"/>

  <!-- Rear wheel -->
  <circle cx="192" cy="168" r="20" fill="#111820"/>
  <circle cx="192" cy="168" r="14" fill="#1A2535"/>
  <circle cx="192" cy="168" r="8"  fill="#0D1520"/>
  <g stroke="#3A5A80" stroke-width="2" opacity="0.8">
    <line x1="192" y1="154" x2="192" y2="182"/>
    <line x1="178" y1="168" x2="206" y2="168"/>
    <line x1="182" y1="158" x2="202" y2="178"/>
    <line x1="202" y1="158" x2="182" y2="178"/>
  </g>
  <circle cx="192" cy="168" r="3" fill="#4A7AA0"/>

  <!-- Ground shadow -->
  <ellipse cx="137" cy="191" rx="95" ry="6" fill="#050E1A" opacity="0.5"/>

  <!-- EV lightning bolt overlay (subtle, lower-right) -->
  <path d="M 214 175 L 207 185 L 212 185 L 205 197 L 217 183 L 212 183 Z"
        fill="#4ABAFF" opacity="0.85"/>

</svg>
